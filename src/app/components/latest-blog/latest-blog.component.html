<div class="nft" *ngFor="let blog of blogs">
  <div class='main'>
    <img class='tokenImage' [src]="blog.image" [alt]="blog.title" /> 
    <a [routerLink]="['/content', blog.id]"><h2>{{ blog.title }}</h2></a>
    <p class='description'>{{ blog.resume }}</p>
    <div class='tokenInfo'>
      <div class="price">
        <ins>◘</ins>
        <p>0.031 ETH</p>
      </div>
      <div class="duration">
        <ins>◷</ins>
        <p>{{ blog.time }}</p>
      </div>
    </div>
    <hr />
    <div class='creator'>
      <div class='wrapper'>
        <img src="https://images.unsplash.com/photo-1620121692029-d088224ddc74?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlbnx8fGVufDB8fHx8&auto=format&fit=crop&w=1932&q=80" alt="Creator" />
      </div>
      <p><ins>Criado por</ins> Célia Medeiros</p>
    </div>
  </div>
</div>
